<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="conteudo">

        <div class="conteudo-titulo">
            <img src="unlock.svg" alt="Cadeado" width="60">

            <h1 class="titulo-principal">
                Gerador de Senhas
            </h1>

            <h2 class="titulo-secundario">
                Gere instantaneamente uma senha aleatória e segura
            </h2>
        </div>

        <div class="conteudo-senha">

            <label for="campo-senha">Senha</label>

            <div class="senha-gerada">

                <input
                    type="text"
                    id="campo-senha"
                    readonly>

                <button id="copiar">
                    📋
                </button>

            </div>

        </div>

        <section class="parametro">

            <h2 class="parametro-titulo">
                Personalize sua senha
            </h2>

            <div class="parametro-coluna__senha">

                <div class="parametro-senha">

                    <h3 class="parametro-senha__titulo">
                        Número de caracteres
                    </h3>

                    <div class="parametro-senha-botoes">

                        <button class="parametro-senha__botao">
                            −
                        </button>

                        <p class="parametro-senha__texto">
                            12
                        </p>

                        <button class="parametro-senha__botao">
                            +
                        </button>

                    </div>

                </div>

                <div class="parametro-senha">

                    <h3 class="parametro-senha__titulo">
                        Características da senha
                    </h3>

                    <div class="parametro-senha-checkbox">
                        <input type="checkbox" id="maiusculo" checked>
                        <label for="maiusculo">Letras maiúsculas</label>
                    </div>

                    <div class="parametro-senha-checkbox">
                        <input type="checkbox" id="minusculo" checked>
                        <label for="minusculo">Letras minúsculas</label>
                    </div>

                    <div class="parametro-senha-checkbox">
                        <input type="checkbox" id="numero" checked>
                        <label for="numero">Números</label>
                    </div>

                    <div class="parametro-senha-checkbox">
                        <input type="checkbox" id="simbolo" checked>
                        <label for="simbolo">Símbolos</label>
                    </div>

                </div>

            </div>

            <div class="parametro-senha parametro-forca">

                <h3 class="parametro-senha__titulo">
                    Força da senha
                </h3>

                <div class="barra-forca">

                    <div id="nivel-forca"></div>

                </div>

                <div class="legenda-forca">

                    <span>Fraca</span>
                    <span>Média</span>
                    <span>Forte</span>

                </div>

                <p id="tempo-forca">
                    Um computador levaria poucos segundos para descobrir essa senha.
                </p>

            </div>

        </section>

    </section>

    <script src="main.js"></script>

</body>

</html>
